      { name: "Sarah Robb O'Hagan",     first: "Sarah Robb",     last: "O'Hagan",          title: "Chief Content and Member Development Officer",                            company: "Peloton",                                                 leaderType: "Corporate",         industry: ["Consumer", "Healthcare"],                       category: "healthcare", bio: "A native Kiwi, Sarah graduated from the University of Auckland and began her career at Air New Zealand and Virgin Atlantic. Her lifelong love of sports led her to Nike, then to President roles at Gatorade and Equinox, and later to CEO roles at Flywheel Sports and EXOS. In early 2026, Sarah joined Peloton to build its member base." },
      { name: "Dawn Ostroff",           first: "Dawn",           last: "Ostroff",          title: "Board Member",                                                            company: "Mattel, Moloco, and Sweetgreen",                          leaderType: "Corporate",         industry: ["Consumer", "Technology"],                       category: "boards",    bio: "Dawn began her career as a TV news reporter before moving to entertainment programming at Lifetime, UPN, and The CW. She went on to build Condé Nast Entertainment and then was Chief Content and Advertising Business Officer at Spotify until 2023. Dawn now serves on the boards of Mattel, Moloco, and Sweetgreen." },
      { name: "Asahi Pompey",           first: "Asahi",          last: "Pompey",           title: "Global Head of Corporate Engagement and President, Goldman Sachs Foundation", company: "Goldman Sachs",                                        leaderType: "Corporate",         industry: ["Finance", "Sustainability"],                    category: "finance",   bio: "Asahi was born in Guyana, grew up in Brooklyn's housing projects, and made her way to Swarthmore College and Columbia Law School. She moved to Goldman Sachs in 2006 and led the firm's Global Corporate Engagement, overseeing initiatives including 10,000 Small Businesses, 10,000 Women, and One Million Black Women." },
      { name: "Jackie Reses",           first: "Jackie",         last: "Reses",            title: "CEO",                                                                     company: "Lead Bank",                                               leaderType: "Founder",           industry: ["Financial Services", "Fintech", "Technology"], category: "finance",   bio: "Born in Atlantic City, Jackie ran her first business at 16. After graduating from Wharton, she worked in M&A at Goldman Sachs and private equity at Apex Partners before becoming Chief Development Officer at Yahoo. She joined Square in 2015 and built Square Capital. In 2021, she bought Lead Bank, a community bank in Kansas City." },
      { name: "Katherine Rice",         first: "Katherine",      last: "Rice",             title: "Partner",                                                                 company: "GingerBread Capital",                                     leaderType: "Private Equity/VC", industry: ["Venture Capital"],                              category: "boards",    bio: "Katherine earned a BA from Vanderbilt and an MBA from Stanford, and began her career on Wall Street. A financial analyst at Kidder Peabody and a consultant at Bain, she moved into retail at Williams-Sonoma for 12 years. In 2014, Katherine pivoted to private equity, now at GingerBread Capital, putting capital behind women founders." },
      { name: "Jana Rich",              first: "Jana",           last: "Rich",             title: "Founder and Former CEO",                                                  company: "Rich Talent Group",                                       leaderType: "Founder",           industry: ["Consumer", "Marketplaces", "Technology"],       category: "boards",    bio: "Jana's journey began in Maine, took her to Vassar, and on to Stanford for her MBA. She spent 18 years at recruiting giants Korn Ferry and Russell Reynolds. In 2014, Jana founded Rich Talent Group—an executive search firm that builds diverse leadership teams and boards—where she spent over a decade as CEO and then Executive Chair." },
      { name: "Rachel Romer",           first: "Rachel",         last: "Romer",            title: "Co-Founder and Executive Chair",                                          company: "Guild",                                                   leaderType: "Founder",           industry: ["Education", "Technology"],                      category: "education", bio: "Unlocking opportunity has been Rachel's passion ever since she was a teenager growing up in Colorado. At Stanford, while pursuing her MBA, she launched her first startup, Student Blueprint. In 2015, she co-founded Guild to mobilize companies to offer education, reskilling and career pathways to American frontline employees." },
      { name: "Ginni Rometty",          first: "Ginni",          last: "Rometty",          title: "Former Chairman, President, and CEO",                                     company: "IBM",                                                     leaderType: "Corporate",         industry: ["AI", "Technology"],                             category: "ai",        bio: "Ginni's career journey began as a systems engineer at IBM, took her through global consulting and operating roles, and led to eight years at the helm as Chairman, President and CEO. She retired in 2020 after 39 years at IBM. Ginni co-chairs One Ten and is on the board of JPMorgan Chase." },
      { name: "Evan Ryan",              first: "Evan",           last: "Ryan",             title: "Former White House Cabinet Secretary",                                    company: "",                                                        leaderType: "Government",        industry: ["Global Security", "Media"],                     category: "security",  bio: "Evan worked early on in the Clinton White House as an aide to Hillary Clinton, then held key roles in the Obama Administration including Assistant Secretary of State for Educational and Cultural Affairs. She helped launch Axios as an EVP during its startup stage. In 2021, she returned to the White House as Cabinet Secretary for four years." },
      { name: "Megan J. Smith",         first: "Megan J.",       last: "Smith",            title: "Founder and CEO",                                                         company: "shift7",                                                  leaderType: "Founder",           industry: ["AI", "Marketplaces", "Technology"],             category: "ai",        bio: "Moving from Buffalo to MIT to Apple (Tokyo) to General Magic to Planet Out to Google to the Obama Administration (as Chief Technology Officer), Megan has had an incredibly rich journey. Now she is building shift7, a collaborative tech platform with a mission to fix systemic social, environmental and economic problems." },
      { name: "Sonia Syngal",           first: "Sonia",          last: "Syngal",           title: "Former CEO",                                                              company: "Gap Inc.",                                                leaderType: "Corporate",         industry: ["Consumer", "Retail", "Technology"],             category: "comms",     bio: "An engineer who began her career at Ford Motor, Sonia moved to Sun Microsystems and then Gap in 2004. She led Old Navy for four years before becoming CEO of Gap Inc. in 2020. She left Gap in 2022 and now serves as a Senior Advisor at Accenture and as a board member at Foot Locker, Tanger, and Tractor Supply." },
      { name: "Chrissy Taylor",         first: "Chrissy",        last: "Taylor",           title: "President and CEO",                                                       company: "Enterprise Mobility",                                     leaderType: "Corporate",         industry: ["Consumer", "Supply Chain", "Transportation"],   category: "comms",     bio: "Chrissy rose from management trainee to CEO of the company founded by her grandfather in 1957. She took the helm of Enterprise Holdings in 2020, changed the name to Enterprise Mobility, and is building the company beyond its rental-car core. She's also an owner of the first majority female-owned soccer club in MLS history: St. Louis CITY SC." },
      { name: "Jennifer Tejada",        first: "Jennifer",       last: "Tejada",           title: "Chairperson and CEO",                                                     company: "PagerDuty",                                               leaderType: "Corporate",         industry: ["Technology"],                                   category: "ai",        bio: "Jenn started her career at Procter & Gamble, moved on to senior roles at several tech companies, and led Keynote Systems before she joined PagerDuty as CEO in 2016. She took PagerDuty public on the NYSE in 2019. Jenn is a director of Estée Lauder." },
      { name: "Baroness Shriti Vadera", first: "Baroness Shriti",last: "Vadera",           title: "Chair",                                                                   company: "Prudential PLC",                                          leaderType: "Corporate",         industry: ["Financial Services", "Insurance"],              category: "finance",   bio: "Shriti's journey began in Uganda and took her to India and then the UK, where she started as an investment banker and served as a Minister in the British government. Her global finance expertise led her to board roles at AstraZeneca, BHP, and SantanderUK, where she served as Chair. She has chaired the Prudential PLC board since 2021." },
      { name: "Kathi Vidal",            first: "Kathi",          last: "Vidal",            title: "Partner",                                                                 company: "Winston & Strawn",                                        leaderType: "Corporate",         industry: ["Legal", "AI"],                                  category: "ai",        bio: "Kathi began her career as an electrical engineer designing aircraft systems at GE and Lockheed Martin. She quit, went to law school, became a top IP litigator and Managing Partner of Winston & Strawn's Silicon Valley office. Kathi joined the Biden White House in 2021 as Director of the U.S. Patent and Trademark Office, and returned to Winston & Strawn in 2025." },
      { name: "Sherrie Westin",         first: "Sherrie",        last: "Westin",           title: "President and CEO",                                                       company: "Sesame Workshop",                                         leaderType: "Nonprofit",         industry: ["Education", "Media"],                           category: "boards",    bio: "Sherrie graduated from the University of Virginia and began her career rising quickly through ABC News and the George H.W. Bush White House. In 1998, she joined Sesame Workshop as EVP and Chief Marketing Officer, and in 2024, became President and CEO. Sherrie oversees research-driven programs that reach children in more than 190 countries." },
      { name: "Meg Whitman",            first: "Meg",            last: "Whitman",          title: "Former U.S. Ambassador to Kenya",                                         company: "",                                                        leaderType: "Government",        industry: ["Consumer", "Retail", "Technology"],             category: "security",  bio: "Meg grew up on Long Island and began her career as a brand manager at P&G. She rose through Bain, Walt Disney, and Stride Rite before heading eBay—growing it over a decade to $8 billion in revenue. After heading HP and HPE as Chair and CEO, she served as U.S. Ambassador to Kenya until early 2025. Meg now serves on the board of CoreWeave." },
    ];

    const TABS = [
      { id: "ai",         label: "AI & Deep Tech" },
      { id: "comms",      label: "Communications / Media" },
      { id: "climate",    label: "Climate / Energy" },
      { id: "education",  label: "Education" },
      { id: "coaches",    label: "Executive Coaches" },
      { id: "boards",     label: "Corporate Boards" },
      { id: "finance",    label: "Finance / Money" },
      { id: "fortune500", label: "Fortune 500 CEO Roles" },
      { id: "security",   label: "Global Security / Cyber" },
      { id: "healthcare", label: "Healthcare" },
      { id: "startups",   label: "Investing in Startups" },
      { id: "sports",     label: "Investing in Sports" },
    ];

    const LEADER_COLORS = {
      "Corporate":          { bg: "#EDE9F8", color: "#3D1A6B" },
      "Founder":            { bg: "#FFF0F0", color: "#8B1A1A" },
      "Private Equity/VC":  { bg: "#E8F0FB", color: "#1A3D7A" },
      "Nonprofit":          { bg: "#E8F5EE", color: "#1A5C35" },
      "Government":         { bg: "#F5F0FF", color: "#4A2090" },
    };

    const PALETTES = [
      { bg: "#2D1B5E", fg: "#C8B8F0" },
      { bg: "#1E3A5F", fg: "#A8C8F0" },
      { bg: "#3D1A3A", fg: "#F0A8D8" },
      { bg: "#1A3D2E", fg: "#A8F0C8" },
      { bg: "#3D2A0A", fg: "#F0D8A8" },
      { bg: "#1A2D50", fg: "#A8C0F0" },
    ];
    const pal      = name => PALETTES[name.charCodeAt(0) % PALETTES.length];
    const initials = name => name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();

    function ExpertCard({ e }) {
      const p = pal(e.name);
      const lc = LEADER_COLORS[e.leaderType] || LEADER_COLORS["Corporate"];
      const [hov, setHov] = useState(false);

      return (
        <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
          background: WHITE, borderRadius: 12,
          border: `1px solid ${hov ? "#C4B8E8" : "#E8E4F0"}`,
          padding: 24, display: "flex", flexDirection: "column", gap: 14,
          transition: "box-shadow 0.2s, border-color 0.2s",
          boxShadow: hov ? "0 8px 28px rgba(91,45,142,0.12)" : "0 1px 4px rgba(0,0,0,0.05)",
        }}>
          <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
            <div style={{
              width: 52, height: 52, borderRadius: "50%", flexShrink: 0,
              background: p.bg, color: p.fg,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontWeight: 700, fontSize: 16, letterSpacing: "0.06em",
              fontFamily: "'Cormorant Garant', Georgia, serif",
            }}>
              {initials(e.name)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 2 }}>
                <h3 style={{ margin: 0, fontSize: 17, fontWeight: 600, color: DARK, lineHeight: 1.25, fontFamily: "'Cormorant Garant', Georgia, serif" }}>
                  {e.name}
                </h3>
                <span style={{ background: "#EDE9F8", color: PURPLE, fontSize: 10, fontWeight: 600, padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap", flexShrink: 0, letterSpacing: "0.04em", textTransform: "uppercase" }}>
                  Champion
                </span>
              </div>
              <p style={{ margin: 0, fontSize: 12, color: "#6B7280", lineHeight: 1.4, fontFamily: "'DM Sans', sans-serif" }}>{e.title}</p>
              {e.company && <p style={{ margin: "2px 0 0", fontSize: 12.5, color: PURPLE, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{e.company}</p>}
            </div>
          </div>



          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
            {e.leaderType && (
              <span style={{ background: lc.bg, color: lc.color, fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: 20, fontFamily: "'DM Sans', sans-serif" }}>
                {e.leaderType}
              </span>
            )}
            {e.industry.slice(0, 2).map(tag => (
              <span key={tag} style={{ background: "#F3F0FA", color: "#5B3A8A", fontSize: 11, fontWeight: 400, padding: "3px 10px", borderRadius: 20, fontFamily: "'DM Sans', sans-serif" }}>
                {tag}
              </span>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("ai");
      const [search, setSearch] = useState("");

      const experts = useMemo(() => {
        const list = EXPERTS.filter(e => e.category === activeTab);
        if (!search.trim()) return list;
        const q = search.toLowerCase();
        return list.filter(e =>
          e.name.toLowerCase().includes(q) ||
          e.company.toLowerCase().includes(q) ||
          e.title.toLowerCase().includes(q) ||
          e.bio.toLowerCase().includes(q) ||
          e.industry.some(x => x.toLowerCase().includes(q))
        );
      }, [activeTab, search]);

      const countByTab = useMemo(() => {
        const c = {};
        EXPERTS.forEach(e => { c[e.category] = (c[e.category] || 0) + 1; });
        return c;
      }, []);

      return (
        <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'DM Sans', sans-serif" }}>

          {/* Nav */}
          <header style={{ background: DARK, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 40px", display: "flex", alignItems: "center", height: 62, gap: 16 }}>
              <a href="https://journeytolead.org" style={{ textDecoration: "none", display: "flex", alignItems: "center" }}>
                <img src="https://journeytolead.org/wp-content/uploads/2024/07/logo.svg" alt="JOURNEY" style={{ height: 32 }} onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='inline'; }} />
                <span style={{ display: "none", color: "#A88FD4", fontWeight: 700, fontSize: 18, letterSpacing: "0.14em", fontFamily: "'Cormorant Garant', Georgia, serif" }}>JOURNEY</span>
              </a>
              <span style={{ color: "rgba(255,255,255,0.2)", fontSize: 18 }}>|</span>
              <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 13.5 }}>Champion Directory</span>
              <div style={{ flex: 1 }} />
              <a href="https://journeytolead.org" style={{ color: "rgba(255,255,255,0.45)", fontSize: 13, textDecoration: "none" }}>journeytolead.org →</a>
            </div>
          </header>

          {/* Hero */}
          <section style={{ background: DARK, padding: "60px 40px 64px" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto" }}>
              <h1 style={{ color: WHITE, margin: "0 0 12px", fontFamily: "'Cormorant Garant', Georgia, serif", fontSize: 56, fontWeight: 600, lineHeight: 1.08, letterSpacing: "-0.01em" }}>
                Champion Directory
              </h1>
              <p style={{ margin: "0 0 32px", color: "#A88FD4", fontSize: 20, fontWeight: 400, fontFamily: "'Cormorant Garant', Georgia, serif", fontStyle: "italic" }}>
                A portal to experts inside the JOURNEY community
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 32 }}>
                {["Want to get smarter on AI?", "Looking to join a Fortune 500 board?", "Considering investments in startups... or sports?"].map(q => (
                  <p key={q} style={{ margin: 0, color: "rgba(255,255,255,0.85)", fontSize: 20, lineHeight: 1.5, fontFamily: "'Cormorant Garant', Georgia, serif" }}>{q}</p>
                ))}
              </div>
              <p style={{ color: "rgba(255,255,255,0.65)", fontSize: 20, maxWidth: 780, margin: 0, lineHeight: 1.75, fontFamily: "'Cormorant Garant', Georgia, serif", fontStyle: "italic" }}>
                JOURNEY Champions are trailblazing CEOs and chairs of large global companies, founders of renowned startups, and leading venture capitalists.
              </p>
            </div>
          </section>

          {/* Sticky controls */}
          <div style={{ background: WHITE, borderBottom: "1px solid #E8E4F0", position: "sticky", top: 0, zIndex: 20, boxShadow: "0 2px 12px rgba(91,45,142,0.08)" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 40px" }}>
              <div style={{ padding: "14px 0 10px", borderBottom: "1px solid #F3F0FA" }}>
                <div style={{ position: "relative", maxWidth: 420 }}>
                  <svg style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "#9CA3AF", pointerEvents: "none" }} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                  <input type="text" placeholder="Search by name, company, or expertise…" value={search} onChange={e => setSearch(e.target.value)}
                    style={{ width: "100%", padding: "9px 14px 9px 38px", border: "1.5px solid #E8E4F0", borderRadius: 8, fontSize: 13.5, fontFamily: "'DM Sans', sans-serif", color: DARK, background: "#FAFAF8" }}
                    onFocus={e => { e.target.style.borderColor = PURPLE; e.target.style.background = WHITE; }}
                    onBlur={e =>  { e.target.style.borderColor = "#E8E4F0"; e.target.style.background = "#FAFAF8"; }}
                  />
                </div>
              </div>
              <div style={{ display: "flex", overflowX: "auto", gap: 2, padding: "8px 0", scrollbarWidth: "none" }}>
                {TABS.map(tab => {
                  const active = activeTab === tab.id;
                  const count  = countByTab[tab.id];
                  return (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                      style={{ padding: "7px 15px", border: "none", borderRadius: 7, cursor: "pointer", fontSize: 13, fontWeight: active ? 600 : 400, whiteSpace: "nowrap", fontFamily: "'DM Sans', sans-serif", background: active ? PURPLE : "transparent", color: active ? WHITE : "#4B5563", transition: "all 0.15s", flexShrink: 0, display: "flex", alignItems: "center", gap: 6 }}
                      onMouseEnter={ev => { if (!active) ev.currentTarget.style.background = "#F3F0FA"; }}
                      onMouseLeave={ev => { if (!active) ev.currentTarget.style.background = "transparent"; }}
                    >
                      {tab.label}
                      {count > 0 && (
                        <span style={{ fontSize: 11, fontWeight: 600, background: active ? "rgba(255,255,255,0.25)" : "#EDE9F8", color: active ? WHITE : PURPLE, borderRadius: 10, padding: "1px 7px" }}>{count}</span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Main */}
          <main style={{ maxWidth: 1200, margin: "0 auto", padding: "40px 40px 80px" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 28 }}>
              <h2 style={{ margin: 0, fontSize: 28, fontWeight: 600, fontFamily: "'Cormorant Garant', Georgia, serif", color: DARK }}>
                {TABS.find(t => t.id === activeTab)?.label}
              </h2>
              <span style={{ color: "#9CA3AF", fontSize: 13.5 }}>
                {experts.length} Champion{experts.length !== 1 ? "s" : ""}
              </span>
            </div>

            {experts.length > 0 ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 24 }}>
                {experts.map((e, i) => <ExpertCard key={`${e.name}-${i}`} e={e} />)}
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
                <p style={{ fontSize: 17, fontFamily: "'Cormorant Garant', Georgia, serif" }}>
                  {search ? `No Champions match "${search}"` : "No Champions in this category yet"}
                </p>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer style={{ background: DARK, padding: "40px 40px" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
              <div>
                <p style={{ margin: "0 0 4px", color: "#A88FD4", fontWeight: 600, fontSize: 15, letterSpacing: "0.1em", fontFamily: "'Cormorant Garant', Georgia, serif" }}>JOURNEY to Lead</p>
                <p style={{ margin: 0, color: "rgba(255,255,255,0.35)", fontSize: 12.5 }}>Changing the lives of women who are changing the world.</p>
              </div>
              <p style={{ margin: 0, color: "rgba(255,255,255,0.35)", fontSize: 12.5 }}>
                © 2025 JOURNEY to Lead ·{" "}
                <a href="https://journeytolead.org" style={{ color: "#A88FD4", textDecoration: "none" }}>journeytolead.org</a>
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
