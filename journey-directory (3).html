          </div>

          <main style={{ maxWidth: 1200, margin: "0 auto", padding: "36px 40px 72px" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 28 }}>
              <h2 style={{ margin: 0, fontSize: 26, fontWeight: 700, fontFamily: "Playfair Display, Georgia, serif", color: "#0F172A" }}>
                {TABS.find(t => t.id === activeTab)?.label}
              </h2>
              <span style={{ color: "#9CA3AF", fontSize: 13.5 }}>{experts.length} Champion{experts.length !== 1 ? "s" : ""}</span>
            </div>
            {experts.length > 0 ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 24 }}>
                {experts.map((e, i) => <ExpertCard key={`${e.name}-${i}`} e={e} />)}
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: "72px 20px", color: "#9CA3AF" }}>
                <p style={{ fontSize: 16 }}>{search ? `No Champions match "${search}"` : "No Champions in this category yet"}</p>
              </div>
            )}
          </main>

          <footer style={{ background: NAVY, padding: "36px 40px" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
              <div>
                <p style={{ margin: "0 0 4px", color: GOLD, fontWeight: 700, fontSize: 15, letterSpacing: "0.1em", fontFamily: "Playfair Display, Georgia, serif" }}>JOURNEY</p>
                <p style={{ margin: 0, color: "rgba(255,255,255,0.4)", fontSize: 12.5 }}>Leadership · Learning · Legacy</p>
              </div>
              <p style={{ margin: 0, color: "rgba(255,255,255,0.4)", fontSize: 12.5 }}>
                © 2025 JOURNEY to Lead · <a href="https://journeytolead.org" style={{ color: GOLD, textDecoration: "none" }}>journeytolead.org</a>
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
